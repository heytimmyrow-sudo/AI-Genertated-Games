<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Tempo</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <main class="shell">
    <section class="hud-frame">
      <div class="title-block">
        <p class="eyebrow">Typing Trainer</p>
        <h1>Typing Tempo</h1>
        <p class="subtitle">Practice clean typing under pressure, build streaks, and improve your speed without leaving the game vault.</p>
      </div>
      <canvas id="gameCanvas" width="900" height="600" aria-label="Typing Tempo game area"></canvas>
      <div class="controls">
        <span>Type: Keyboard</span>
        <span>Start: Enter</span>
        <span>Pause: Tab</span>
        <span>Menu: Esc</span>
        <span>Restart: Enter after round</span>
      </div>
    </section>
  </main>
  <script src="../js/typing.js"></script>
</body>
</html>
