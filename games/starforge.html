<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starforge Salvage</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <main class="shell">
    <section class="hud-frame">
      <div class="title-block">
        <p class="eyebrow">Top-Down Wreck Run</p>
        <h1>Starforge Salvage</h1>
        <p class="subtitle">Sweep a shattered starfield, gather energy cores, and vaporize hunter drones before they swarm your salvage ship.</p>
      </div>
      <canvas id="gameCanvas" width="900" height="600" aria-label="Starforge Salvage game area"></canvas>
      <div class="controls">
        <span>Move: W / A / S / D</span>
        <span>Dash: Space</span>
        <span>Start: Enter</span>
        <span>Pause: P</span>
        <span>Menu: Esc</span>
        <span>Restart: R</span>
        <span>Goal: Collect 6 cores</span>
      </div>
    </section>
  </main>
  <script src="../js/starforge.js"></script>
</body>
</html>
