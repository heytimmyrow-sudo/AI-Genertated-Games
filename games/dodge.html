<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purple Square Panic</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <main class="shell">
    <section class="hud-frame">
      <div class="title-block">
        <p class="eyebrow">Arcade Dodge Run</p>
        <h1>Purple Square Panic</h1>
        <p class="subtitle">Slide the purple square across the bottom, dodge the red and green squares, and grab yellow powerups to survive longer.</p>
      </div>
      <canvas id="gameCanvas" width="900" height="600" aria-label="Purple Square Panic game area"></canvas>
      <div class="controls">
        <span>Move: A / D</span>
        <span>Move: Left / Right</span>
        <span>Start: Enter</span>
        <span>Pause: P</span>
        <span>Menu: Esc</span>
        <span>Restart: R</span>
        <span>Yellow Squares: Powerups</span>
      </div>
    </section>
  </main>
  <script src="../js/dodge.js"></script>
</body>
</html>
