<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Apex Rush</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <main class="shell">
    <section class="hud-frame">
      <div class="title-block">
        <p class="eyebrow">Arcade Racing Sprint</p>
        <h1>Neon Apex Rush</h1>
        <p class="subtitle">Attack a longer neon circuit, race five rivals across three laps, and use boost wisely to climb the order.</p>
      </div>
      <canvas id="gameCanvas" width="900" height="600" aria-label="Neon Apex Rush game area"></canvas>
      <div class="controls">
        <span>Steer: A / D</span>
        <span>Throttle: W / Up</span>
        <span>Brake: S / Down</span>
        <span>Boost: Space</span>
        <span>Choose Track: Left / Right</span>
        <span>Start: Enter</span>
        <span>Pause: P</span>
        <span>Menu: Esc</span>
        <span>Restart: R</span>
        <span>Goal: Finish P1</span>
      </div>
    </section>
  </main>
  <script src="../js/racing.js"></script>
</body>
</html>
