<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Key Test</title>
    <style>
      body { font-family: system-ui; padding: 20px; }
      #box { padding: 14px; border-radius: 12px; background: #111; color: #fff; }
      .small { opacity: .8; font-size: 12px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h2>Keyboard Test</h2>
    <div id="box">Last key: (none)</div>
    <div class="small">Click this page once, then press WASD.</div>

    <script>
      const box = document.getElementById("box");
      function show(e, type){
        box.textContent = `${type}: key="${e.key}" code="${e.code}"`;
      }
      window.addEventListener("keydown", (e) => show(e, "down"), true);
      window.addEventListener("keyup", (e) => show(e, "up"), true);
      document.addEventListener("keydown", (e) => show(e, "down"), true);
    </script>
  </body>
</html>
